<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talk | Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --gold: #d4a853;
            --gold-light: #e8c882;
            --charcoal: #000000;
            --charcoal-light: #1a1a1a;
            --charcoal-medium: #252525;
            --off-white: #f5f5f3;
            --gray-100: #e8e8e6;
            --gray-400: #8a8a88;
            --gray-600: #4a4a48;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--charcoal);
            color: var(--off-white);
            min-height: 100vh;
        }

        .admin-header {
            background: var(--charcoal-light);
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .admin-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--off-white);
        }

        .admin-logo i {
            color: var(--gold);
            font-size: 1.5rem;
        }

        .admin-logo span {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 500;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 1px solid var(--gray-600);
            color: var(--gray-400);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 4rem;
        }

        .admin-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .admin-subtitle {
            color: var(--gray-400);
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--charcoal-light);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .stat-card h3 {
            font-size: 2rem;
            color: var(--gold);
            font-weight: 600;
        }

        .stat-card p {
            color: var(--gray-400);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .inquiries-section {
            background: var(--charcoal-light);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1rem;
            padding: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
        }

        .clear-btn {
            padding: 0.5rem 1rem;
            background: rgba(255,100,100,0.1);
            border: 1px solid rgba(255,100,100,0.3);
            color: #ff6b6b;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            background: rgba(255,100,100,0.2);
        }

        .inquiries-table {
            width: 100%;
            border-collapse: collapse;
        }

        .inquiries-table th,
        .inquiries-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .inquiries-table th {
            color: var(--gray-400);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .inquiries-table td {
            font-size: 0.95rem;
        }

        .inquiries-table tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .tech-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(212,168,83,0.15);
            color: var(--gold);
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .date-badge {
            color: var(--gray-400);
            font-size: 0.85rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--gray-400);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .admin-container {
                padding: 2rem 1.5rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .inquiries-table {
                display: block;
                overflow-x: auto;
            }
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--charcoal);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--charcoal-light);
            padding: 3rem;
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            margin-bottom: 2rem;
        }

        .login-logo i {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .login-logo h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--off-white);
        }

        .login-box .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .login-box label {
            display: block;
            color: var(--gray-400);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .login-box input {
            width: 100%;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.5rem;
            color: var(--off-white);
            font-size: 1rem;
        }

        .login-box input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--gold);
            border: none;
            border-radius: 0.5rem;
            color: var(--charcoal);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: var(--gold-light);
        }

        .login-error {
            color: #ff6b6b;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <div class="login-logo">
                <i class="fa-solid fa-shield-halved"></i>
                <h2>Admin Login</h2>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
                <p class="login-error" id="loginError"></p>
            </form>
        </div>
    </div>

    <header class="admin-header" style="display:none;" id="adminHeader">
        <a href="#" class="admin-logo">
            <i class="fa-solid fa-comments"></i>
            <span>Tech Talk Admin</span>
        </a>
        <div style="display:flex;gap:1rem;align-items:center;">
            <a href="index.html" class="back-btn">
                <span>Back to Site</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <button onclick="logout()" class="back-btn" style="background:rgba(255,100,100,0.1);border-color:rgba(255,100,100,0.3);color:#ff6b6b;">
                <span>Logout</span>
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </header>

    <div class="admin-container" style="display:none;" id="adminContent">
        <h1 class="admin-title">Dashboard</h1>
        <p class="admin-subtitle">Manage your inquiries and contact submissions</p>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="total-inquiries">0</h3>
                <p>Total Inquiries</p>
            </div>
            <div class="stat-card">
                <h3 id="this-week">0</h3>
                <p>This Week</p>
            </div>
            <div class="stat-card">
                <h3 id="unity-queries">0</h3>
                <p>Unity Inquiries</p>
            </div>
            <div class="stat-card">
                <h3 id="flutter-queries">0</h3>
                <p>Flutter Inquiries</p>
            </div>
        </div>

        <div class="inquiries-section">
            <div class="section-header">
                <h2>Recent Inquiries</h2>
                <button class="clear-btn" onclick="clearAllData()">
                    <i class="fa-solid fa-trash"></i> Clear All
                </button>
            </div>
            <table class="inquiries-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Technology</th>
                        <th>Message</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="inquiries-body">
                </tbody>
            </table>
            <div class="empty-state" id="empty-state">
                <i class="fa-solid fa-inbox"></i>
                <p>No inquiries yet</p>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'techtalk1730';
        const API_URL = 'http://localhost:3001/api/inquiries';
        const STATS_URL = 'http://localhost:3001/api/stats';
        
        const loginForm = document.getElementById('loginForm');
        const loginOverlay = document.getElementById('loginOverlay');
        const adminHeader = document.getElementById('adminHeader');
        const adminContent = document.getElementById('adminContent');
        const loginError = document.getElementById('loginError');
        
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            showAdmin();
        }
        
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                localStorage.setItem('adminLoggedIn', 'true');
                showAdmin();
            } else {
                loginError.textContent = 'Invalid username or password';
            }
        });
        
        function showAdmin() {
            loginOverlay.style.display = 'none';
            adminHeader.style.display = 'flex';
            adminContent.style.display = 'block';
            loadData();
        }
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            loginOverlay.style.display = 'flex';
            adminHeader.style.display = 'none';
            adminContent.style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            loginError.textContent = '';
        }
        
        function loadData() {
            fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    console.log('Data:', data);
                    if (data.success && data.data) {
                        showData(data.data);
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    document.getElementById('inquiries-body').innerHTML = 
                        '<tr><td colspan="6">Error loading data - Backend not running</td></tr>';
                });
            
            fetch(STATS_URL)
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.stats) {
                        document.getElementById('total-inquiries').textContent = data.stats.total || 0;
                        document.getElementById('this-week').textContent = data.stats.thisWeek || 0;
                        document.getElementById('unity-queries').textContent = data.stats.unity || 0;
                        document.getElementById('flutter-queries').textContent = data.stats.flutter || 0;
                    }
                })
                .catch(err => console.error('Stats error:', err));
        }
        
        function showData(items) {
            const tbody = document.getElementById('inquiries-body');
            const emptyState = document.getElementById('empty-state');
            
            if (!items || items.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td>${item.name || '-'}</td>
                    <td>${item.email || '-'}</td>
                    <td>${item.phone || '-'}</td>
                    <td><span class="tech-badge">${item.tech || '-'}</span></td>
                    <td>${item.message ? (item.message.substring(0, 50) + (item.message.length > 50 ? '...' : '')) : '-'}</td>
                    <td><span class="date-badge">${item.created_at ? item.created_at : '-'}</span></td>
                </tr>
            `).join('');
        }

        function clearAllData() {
            if (confirm('Clear all inquiries?')) {
                fetch(API_URL, { method: 'DELETE' })
                    .then(() => loadData());
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
